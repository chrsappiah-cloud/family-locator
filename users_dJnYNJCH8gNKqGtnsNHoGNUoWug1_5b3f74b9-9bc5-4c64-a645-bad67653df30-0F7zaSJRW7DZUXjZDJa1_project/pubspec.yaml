name: family_map
description: "A hyperrealistic \"Family Cockpit\" app that seamlessly blends live location tracking, real-time family chat previews, and intuitive subscription management, all within a stunning glass-themed interface."
publish_to: "none"
version: 1.0.0

environment:
  sdk: ^3.6.0

dependencies:
  app_links: ^6.0.0
  supabase_flutter: '>=1.10.0'
  geolocator: 13.0.4
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  provider: ^6.1.2
  go_router: ^16.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/dreamflow_icon.jpg
  remove_alpha_ios: true
